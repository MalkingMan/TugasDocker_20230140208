<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #f3f4f6;
            color: #111827;
        }

        .login-wrapper {
            min-height: 100vh;
        }

        .login-card {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
            background: #ffffff;
        }

        .login-body {
            padding: 2rem;
        }

        .login-title {
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
        }

        .form-control {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 0.72rem 0.9rem;
        }

        .form-control:focus {
            border-color: #9ca3af;
            box-shadow: 0 0 0 0.2rem rgba(156, 163, 175, 0.2);
        }

        .btn-login {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 0.72rem 1rem;
            font-weight: 600;
            background: #111827;
        }

        .btn-login:hover {
            background: #1f2937;
        }
    </style>
</head>
<body>
<div class="container login-wrapper d-flex align-items-center justify-content-center py-4">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card login-card">
            <div    class="login-body">
                <h3 class="login-title mb-1">Login</h3>
                <p class="text-secondary mb-4">Silakan masuk ke akun Anda</p>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Masukkan password" required>
                    </div>

                    <button type="submit" class="btn btn-dark btn-login">Masuk</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
