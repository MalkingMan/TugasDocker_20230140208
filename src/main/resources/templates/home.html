<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f3f4f6;
            color: #111827;
        }

        .page-shell {
            max-width: 980px;
        }

        .surface-card {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(17, 24, 39, 0.06);
            background: #ffffff;
        }

        .title {
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .btn-neutral {
            border-radius: 10px;
            font-weight: 600;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            border-bottom-width: 1px;
            background: #f9fafb;
            color: #374151;
            font-weight: 600;
        }

        .table tbody td {
            color: #1f2937;
        }

        .empty-state {
            padding: 1.25rem;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container page-shell py-4 py-md-5">
        <div class="d-flex flex-wrap gap-3 justify-content-between align-items-start mb-4">
            <div>
                <h2 class="title mb-1" th:text="${websiteTitle}">Array 20230140208</h2>
                <p class="text-muted mb-1">Selamat datang di aplikasi</p>
                <small class="text-secondary" th:text="${identityText}">Nama: Muhammad Array | NIM: 20230140208
                </small>
            </div>
            <a class="btn btn-outline-dark btn-sm btn-neutral" th:href="@{/logout}">Logout</a>
        </div>

        <div class="surface-card p-3 p-md-4">
            <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-semibold">Data Mahasiswa</h5>
                <a class="btn btn-dark btn-sm btn-neutral" th:href="@{/form}">Input Data Mahasiswa</a>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th style="width: 80px;">No</th>
                            <th>Nama</th>
                            <th>NIM</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="3" class="empty-state">Belum ada data</td>
                        </tr>
                        <tr th:each="user, iter : ${users}">
                            <td th:text="${iter.count}">1</td>
                            <td th:text="${user.nama}">Nama</td>
                            <td th:text="${user.nim}">NIM</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
