<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2 class="mb-1" th:text="${websiteTitle}">Array 20230140208</h2>
            <p class="text-muted mb-0">Selamat datang di aplikasi!</p>
            <small class="text-secondary" th:text="${identityText}">Nama: Muhammad Array | NIM: 20230140208</small>
        </div>
        <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Data Mahasiswa</h5>
                <a class="btn btn-primary btn-sm" th:href="@{/form}">+ Input Data Mahasiswa</a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle mb-0">
                    <thead class="table-primary">
                    <tr>
                        <th style="width: 80px;">No</th>
                        <th>Nama</th>
                        <th>NIM</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="3" class="text-center">Belum ada data</td>
                    </tr>
                    <tr th:each="user, iter : ${users}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${user.nama}">Nama</td>
                        <td th:text="${user.nim}">NIM</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
