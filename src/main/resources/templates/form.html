<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h3 class="mb-1">Form Input Mahasiswa</h3>
    <p class="text-muted" th:text="${websiteTitle}">MY Website 20210140019</p>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/save}" method="post" th:object="${user}">
                <div class="mb-3">
                    <label for="nama" class="form-label">Nama</label>
                    <input type="text" class="form-control" id="nama" th:field="*{nama}" required>
                </div>

                <div class="mb-3">
                    <label for="nim" class="form-label">NIM</label>
                    <input type="text" class="form-control" id="nim" th:field="*{nim}" required>
                </div>

                <button type="submit" class="btn btn-primary btn-sm">Submit</button>
                <a th:href="@{/home}" class="btn btn-link btn-sm">Kembali ke Home</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
